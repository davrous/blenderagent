# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: blender-scene-agent
description: >
  An AI agent that creates and manipulates 3D scenes in Blender.
  Communicates with a headless Blender instance via TCP socket to create
  objects, apply materials, use Poly Haven assets, and return viewport screenshots.
metadata:
  authors:
    - Microsoft
  tags:
    - Azure AI AgentServer
    - Microsoft Agent Framework
    - Blender
    - 3D Scene Creation
    - BlenderMCP
protocols:
  - protocol: responses
    version: v1
environment_variables:
  - name: PROJECT_ENDPOINT
    value: "{{PROJECT_ENDPOINT}}"
  - name: MODEL_DEPLOYMENT_NAME
    value: "{{MODEL_DEPLOYMENT_NAME}}"
  - name: BLENDER_HOST
    value: "localhost"
  - name: BLENDER_PORT
    value: "9876"