# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: new-fantasy-worlds-agent
description: >
  An AI agent that creates and manipulates 3D scenes in Blender.
  Communicates with a headless Blender instance via TCP socket to create
  objects, apply materials, import ready-made 3D models from Microsoft's
  model library, apply Poly Haven PBR textures, and return viewport screenshots.
metadata:
  authors:
    - Microsoft
  tags:
    - Azure AI AgentServer
    - Microsoft Agent Framework
    - Blender
    - 3D Scene Creation
    - BlenderMCP
protocols:
  - protocol: responses
    version: 1.0.0
  # Voice path: speech-in / speech-out over a WebSocket. The platform relays
  # browser frames to the container's voice WebSocket (port VOICE_WS_PORT).
  - protocol: invocations_ws
    version: 1.0.0
environment_variables:
  - name: PROJECT_ENDPOINT
    value: "{{PROJECT_ENDPOINT}}"
  - name: MODEL_DEPLOYMENT_NAME
    value: "{{MODEL_DEPLOYMENT_NAME}}"
  - name: BLENDER_HOST
    value: "localhost"
  - name: BLENDER_PORT
    value: "9876"
  - name: AZURE_STORAGE_ACCOUNT_NAME
    value: "{{AZURE_STORAGE_ACCOUNT_NAME}}"
  # ── Voice (speech-in / speech-out) ──
  # Keyless Speech auth: grant this agent's Entra identity the
  # "Cognitive Services User" (or "Cognitive Services Speech User") role on the
  # Speech/AI Services resource. Deploy in the same region (e.g. northcentralus).
  - name: ENABLE_VOICE
    value: "true"
  - name: SPEECH_REGION
    value: "{{SPEECH_REGION}}"
  - name: SPEECH_RESOURCE_ID
    value: "{{SPEECH_RESOURCE_ID}}"
  - name: SPEECH_VOICE_NAME
    value: "en-US-NovaMultilingualNeuralHD"
  - name: SPEECH_VOICE_FALLBACK
    value: "en-US-AvaMultilingualNeural"
  - name: VOICE_WS_PORT
    value: "8089"
dockerfile_path: Dockerfile
resources:
  cpu: '2.0'
  memory: 4.0Gi
